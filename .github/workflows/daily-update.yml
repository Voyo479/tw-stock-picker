name: 每日自動更新台股選股資料

on:
  schedule:
    # UTC 23:00(前一天) = 台灣時間 07:00，週一到週五執行
    # 根據實測發現：TWSE資料似乎是「隔夜整理，隔天早上才會真正就緒」，
    # 當天下午抓到的常常還是前一個交易日的舊資料，所以改成隔天早上抓取，
    # 抓到的會是「前一個交易日」的完整正確資料
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    # 允許手動觸發（在GitHub網頁上點按鈕手動執行一次，方便測試）
    inputs:
      force_update:
        description: '強制執行（略過假日/重複資料判斷，測試用）'
        type: boolean
        default: false

# 讓這個排程有權限把結果commit回repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 簽出(checkout) repo 內容
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests beautifulsoup4

      - name: 執行選股程式
        env:
          FORCE_UPDATE: ${{ inputs.force_update }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/update_data.py

      - name: 檢查是否有資料變動並commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in data/stock_pool.json data/industry_mapping.json docs/result.json; do
            if [ -f "$f" ]; then
              git add "$f"
            else
              echo "提醒：$f 這次沒有產生，略過"
            fi
          done
          if git diff --cached --quiet; then
            echo "今天沒有新資料變動（可能是假日，或本次無新檔案），不需要commit"
          else
            git commit -m "自動更新選股資料 $(date -u +'%Y-%m-%d')"
            git push
          fi
